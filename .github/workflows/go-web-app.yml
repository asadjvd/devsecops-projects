# CICD using GitHub actions

name: CI/CD

# Exclude the workflow to run on changes to the helm chart
on:
  push:
    branches: [main]
    paths:
      - 'go-web-app-devops/**'
      - '.github/workflows/go-web-app.yml'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v5
      with:
        go-version: 1.22
        
    - name: Build
      working-directory: go-web-app-devops
      run: go build -o go-web-app

    - name: Test
      working-directory: go-web-app-devops
      run: go test ./...
  
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.22
        cache: true

    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Run golangci-lint
      working-directory: go-web-app-devops
      run: golangci-lint run --timeout=5m
  
  push:
    runs-on: ubuntu-latest

    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push action
      uses: docker/build-push-action@v6
      with:
        context: ./go-web-app-devops
        file: ./go-web-app-devops/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    needs: push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in Helm chart
      run: |
        sed -i 's/tag: .*/tag: "${{github.run_id}}"/' go-web-app-devops/Helm/go-web-app-chart/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "asad.jvd00@gmail.com"
        git config --global user.name "Asad Javed"
        git add go-web-app-devops/Helm/go-web-app-chart/values.yaml
        git commit -m "Update tag in Helm chart"
        git push
